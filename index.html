<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Asistencia - EPM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --epm-green: #7ad300;
      --epm-dark: #242424;
      --epm-gray: #f4f5f7;
      --text-main: #333333;
      --text-muted: #666666;
      --border-radius: 12px;
      --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    
    body {
      margin: 0;
      padding: 20px;
      font-family: var(--font-sans);
      background-color: #eef2f5;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      align-items: flex-start;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: var(--border-radius);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
      margin-top: 20px;
    }

    /* Cabecera EPM */
    .header {
      background-color: var(--epm-dark);
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-box {
      background-color: var(--epm-green);
      border-radius: 10px;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: var(--epm-dark);
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-text h1 {
      margin: 0;
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header-text p {
      margin: 4px 0 0;
      color: var(--epm-green);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .content {
      padding: 30px;
    }

    /* Formulario */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
      transition: all 0.3s ease;
      background-color: #fafafa;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--epm-green);
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(122, 211, 0, 0.1);
    }

    /* Botones */
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit {
      background-color: var(--epm-green);
      color: var(--epm-dark);
      margin-top: 10px;
    }

    .btn-submit:hover {
      background-color: #8be600;
      transform: translateY(-1px);
    }

    .btn-submit:disabled {
      background-color: #e5e7eb;
      color: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background-color: transparent;
      border: 2px solid var(--epm-dark);
      color: var(--epm-dark);
      margin-top: 16px;
    }

    .btn-secondary:hover {
      background-color: var(--epm-dark);
      color: #ffffff;
    }

    /* Mensajes */
    .error-msg {
      color: #dc2626;
      font-size: 13px;
      margin-top: -10px;
      margin-bottom: 15px;
      display: none;
      background: #fef2f2;
      padding: 10px;
      border-radius: 6px;
      border-left: 4px solid #dc2626;
    }

    #success-section {
      text-align: center;
      display: none;
      padding: 20px 0;
    }

    .success-icon {
      font-size: 56px;
      color: var(--epm-green);
      margin-bottom: 16px;
    }
    
    .success-name {
      font-size: 18px;
      font-weight: 700;
      margin: 10px 0;
      color: var(--epm-dark);
    }

    /* Separador */
    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 32px 0;
    }

    /* Lista de Asistentes */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .list-header h3 {
      margin: 0;
      font-size: 16px;
      color: var(--text-main);
    }

    .badge {
      background: var(--epm-dark);
      color: #ffffff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    .attendees-list {
      max-height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 5px;
    }

    /* Scrollbar personalizado */
    .attendees-list::-webkit-scrollbar { width: 6px; }
    .attendees-list::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    .attendees-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    .attendee-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: var(--epm-gray);
      border-radius: 10px;
      transition: background 0.2s;
    }
    
    .attendee-item:hover {
      background: #e8eaed;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background: var(--epm-green);
      color: var(--epm-dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }

    .att-details {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .att-name {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .att-cargo {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-msg {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      padding: 20px;
      background: #fafafa;
      border-radius: 8px;
      border: 1px dashed #d1d5db;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Cabecera -->
    <div class="header">
      <div class="logo-box">EPM</div>
      <div class="header-text">
        <h1>Registro de Asistencia</h1>
        <p>Núcleo Estratégico</p>
      </div>
    </div>

    <div class="content">
      
      <!-- Sección del Formulario -->
      <div id="form-section">
        <div class="error-msg" id="error-msg">
          <i class="ti ti-alert-circle"></i> Por favor, completa todos los campos (Nombre, Cargo y Empresa).
        </div>

        <div class="form-group">
          <label for="nombre">Nombre Completo</label>
          <input type="text" id="nombre" placeholder="Ej. Juan Pérez">
        </div>

        <div class="form-group">
          <label for="cargo">Cargo</label>
          <input type="text" id="cargo" placeholder="Ej. Profesional Estratégico">
        </div>

        <!-- AQUÍ ESTÁ EL CAMPO EMPRESA CLARAMENTE VISIBLE -->
        <div class="form-group">
          <label for="empresa">Empresa</label>
          <input type="text" id="empresa" placeholder="Ej. EPM, Afinia, ENSA...">
        </div>

        <button class="btn btn-submit" id="btn-submit" onclick="registrar()">
          <i class="ti ti-check"></i> Confirmar Asistencia
        </button>
      </div>

      <!-- Sección de Éxito -->
      <div id="success-section">
        <i class="ti ti-circle-check-filled success-icon"></i>
        <h2>¡Registro Exitoso!</h2>
        <div class="success-name" id="success-name-label"></div>
        <p style="color: #666; font-size: 14px;">Tu asistencia ha sido guardada correctamente en la base de datos.</p>
        <button class="btn btn-secondary" onclick="nuevaPersona()">
          <i class="ti ti-user-plus"></i> Registrar otra persona
        </button>
      </div>

      <div class="divider"></div>

      <!-- Lista de Asistentes -->
      <div class="list-header">
        <h3>Asistentes Registrados</h3>
        <span class="badge" id="count-badge">0</span>
      </div>
      
      <div class="attendees-list" id="attendees-list">
        <!-- Los asistentes aparecerán aquí -->
      </div>

    </div>
  </div>

  <script>
    // URL DE GOOGLE APPS SCRIPT ACTUALIZADA
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyWCJhhim_pR4efGwF8g3khMeVLJXNKv0y6RP_0vaG_0EFfB2moj8sDZlQxnSDrGIvqlg/exec";
    
    // Recuperar lista del almacenamiento local o iniciar vacía
    let attendees = JSON.parse(localStorage.getItem('epm_attendees_v2') || '[]');

    function initials(name) {
      return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function saveAttendees() {
      localStorage.setItem('epm_attendees_v2', JSON.stringify(attendees));
    }

    function renderList() {
      const list = document.getElementById('attendees-list');
      const badge = document.getElementById('count-badge');
      if(badge) badge.textContent = attendees.length;
      
      if (attendees.length === 0) {
        list.innerHTML = '<div class="empty-msg">Aún no hay asistentes registrados hoy.</div>';
        return;
      }
      
      // Construir la lista visual
      list.innerHTML = attendees.map(a => {
        return `
          <div class="attendee-item">
            <div class="avatar">${initials(a.nombre)}</div>
            <div class="att-details">
              <div class="att-name">${a.nombre}</div>
              <div class="att-cargo">${a.cargo} • <strong>${a.empresa}</strong></div>
            </div>
          </div>
        `;
      }).reverse().join(''); // Reverse para que el último registro salga arriba
    }

    async function sendToGoogleSheets(data) {
      try {
        await fetch(WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
      } catch (error) {
        console.error("Error de red al enviar a Google Sheets:", error);
      }
    }

    async function registrar() {
      // Obtener los valores de los TRES campos
      const nombre = document.getElementById('nombre').value.trim();
      const cargo = document.getElementById('cargo').value.trim();
      const empresa = document.getElementById('empresa').value.trim();
      
      const errEl = document.getElementById('error-msg');
      const btn = document.getElementById('btn-submit');

      // Validar que los tres tengan información
      if (!nombre || !cargo || !empresa) { 
        errEl.style.display = 'block'; 
        return; 
      }

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';

      const nuevoRegistro = { nombre, cargo, empresa };

      // 1. Enviar datos a Google Sheets
      await sendToGoogleSheets(nuevoRegistro);

      // 2. Guardar en caché local para mostrar la lista
      attendees.push(nuevoRegistro);
      saveAttendees();
      
      // Mostrar pantalla de éxito
      document.getElementById('success-name-label').innerHTML = `${nombre}<br><span style="font-size:14px; font-weight:normal; color:#666;">${cargo} en ${empresa}</span>`;
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('success-section').style.display = 'block';
      
      // Restaurar botón
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-check"></i> Confirmar Asistencia';
      
      renderList();
    }

    function nuevaPersona() {
      // Limpiar los tres campos
      document.getElementById('nombre').value = '';
      document.getElementById('cargo').value = '';
      document.getElementById('empresa').value = '';
      
      // Cambiar vistas
      document.getElementById('success-section').style.display = 'none';
      document.getElementById('form-section').style.display = 'block';
      
      // Hacer focus en el primer campo
      document.getElementById('nombre').focus();
    }

    // Inicializar la vista al cargar la página
    renderList();
  </script>
</body>
</html>
