<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Asistencia - Grupo EPM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --epm-green: #7ad300;
      --epm-dark: #242424;
      --epm-gray: #f4f5f7;
      --text-main: #333333;
      --text-muted: #666666;
      --border-radius: 12px;
      --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    
    body {
      margin: 0;
      padding: 20px;
      font-family: var(--font-sans);
      background-color: #eef2f5;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      align-items: flex-start;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: var(--border-radius);
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
      margin-top: 20px;
    }

    /* Cabecera EPM */
    .header {
      background-color: var(--epm-dark);
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-box {
      background-color: var(--epm-green);
      border-radius: 10px;
      padding: 0 12px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: var(--epm-dark);
      font-size: 15px;
      text-align: center;
      line-height: 1.1;
      flex-shrink: 0;
    }

    .header-text h1 {
      margin: 0;
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header-text p {
      margin: 6px 0 0;
      color: var(--epm-green);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }

    .content {
      padding: 30px;
    }

    /* Formulario */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
      transition: all 0.3s ease;
      background-color: #fafafa;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--epm-green);
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(122, 211, 0, 0.1);
    }

    /* Botones */
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit {
      background-color: var(--epm-green);
      color: var(--epm-dark);
      margin-top: 10px;
    }

    .btn-submit:hover {
      background-color: #8be600;
      transform: translateY(-1px);
    }

    .btn-submit:disabled {
      background-color: #e5e7eb;
      color: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background-color: transparent;
      border: 2px solid var(--epm-dark);
      color: var(--epm-dark);
      margin-top: 16px;
    }

    .btn-secondary:hover {
      background-color: var(--epm-dark);
      color: #ffffff;
    }

    /* Mensajes */
    .error-msg {
      color: #dc2626;
      font-size: 13px;
      margin-top: -10px;
      margin-bottom: 15px;
      display: none;
      background: #fef2f2;
      padding: 10px;
      border-radius: 6px;
      border-left: 4px solid #dc2626;
    }

    #success-section {
      text-align: center;
      display: none;
      padding: 20px 0;
    }

    .success-icon {
      font-size: 56px;
      color: var(--epm-green);
      margin-bottom: 16px;
    }
    
    .success-name {
      font-size: 18px;
      font-weight: 700;
      margin: 10px 0;
      color: var(--epm-dark);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="logo-box">Grupo<br>EPM</div>
      <div class="header-text">
        <h1>Registro de Asistencia</h1>
        <p>Segunda sesión: Plan de contingencia ante escenario de Racionamiento</p>
      </div>
    </div>

    <div class="content">
      
      <div id="form-section">
        <div class="error-msg" id="error-msg">
          <i class="ti ti-alert-circle"></i> Por favor, completa todos los campos (Nombre, Cargo y Empresa).
        </div>

        <div class="form-group">
          <label for="nombre">Nombre Completo</label>
          <input type="text" id="nombre" placeholder="Ej. Juan Pérez">
        </div>

        <div class="form-group">
          <label for="cargo">Cargo</label>
          <input type="text" id="cargo" placeholder="Ej. Profesional Estratégico">
        </div>

        <div class="form-group">
          <label for="empresa">Empresa</label>
          <input type="text" id="empresa" placeholder="Ej. EPM, Afinia...">
        </div>

        <button class="btn btn-submit" id="btn-submit" onclick="registrar()">
          <i class="ti ti-check"></i> Confirmar Asistencia
        </button>
      </div>

      <div id="success-section">
        <i class="ti ti-circle-check-filled success-icon"></i>
        <h2>¡Registro Exitoso!</h2>
        <div class="success-name" id="success-name-label"></div>
        <p style="color: #666; font-size: 14px;">Tu asistencia ha sido guardada correctamente.</p>
        <button class="btn btn-secondary" onclick="nuevaPersona()">
          <i class="ti ti-user-plus"></i> Registrar otra persona
        </button>
      </div>

    </div>
  </div>

  <script>
    // URL DE GOOGLE APPS SCRIPT
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyWCJhhim_pR4efGwF8g3khMeVLJXNKv0y6RP_0vaG_0EFfB2moj8sDZlQxnSDrGIvqlg/exec";
    
    async function sendToGoogleSheets(data) {
      try {
        await fetch(WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
      } catch (error) {
        console.error("Error de red al enviar a Google Sheets:", error);
      }
    }

    async function registrar() {
      const nombre = document.getElementById('nombre').value.trim();
      const cargo = document.getElementById('cargo').value.trim();
      const empresa = document.getElementById('empresa').value.trim();
      
      const errEl = document.getElementById('error-msg');
      const btn = document.getElementById('btn-submit');

      if (!nombre || !cargo || !empresa) { 
        errEl.style.display = 'block'; 
        return; 
      }

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';

      const nuevoRegistro = { nombre, cargo, empresa };

      // Enviar datos a Google Sheets
      await sendToGoogleSheets(nuevoRegistro);

      // Mostrar pantalla de éxito
      document.getElementById('success-name-label').innerHTML = `${nombre}<br><span style="font-size:14px; font-weight:normal; color:#666;">${cargo} en ${empresa}</span>`;
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('success-section').style.display = 'block';
      
      // Restaurar botón
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-check"></i> Confirmar Asistencia';
    }

    function nuevaPersona() {
      // Limpiar los campos
      document.getElementById('nombre').value = '';
      document.getElementById('cargo').value = '';
      document.getElementById('empresa').value = '';
      
      // Cambiar vistas
      document.getElementById('success-section').style.display = 'none';
      document.getElementById('form-section').style.display = 'block';
      
      // Hacer focus en el primer campo
      document.getElementById('nombre').focus();
    }
  </script>
</body>
</html>
